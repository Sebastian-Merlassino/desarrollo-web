<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!--CSS boostrap-->

    <link rel="stylesheet" href="../css/style.css"><!--enlace con css-->
</head>
<body>

    <header><!--encabezado-->
        <img src="../assets/img/Logopit_1546119869136.png" alt="Logotipo de Gestión SySO">
        <nav>
            <ul> <!--ul>li*5>a-->
                <li><a href="../index.html">Inicio</a></li><!--enlace relativo (entre páginas dentro del mismo proyecto)-->

                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main><!--contenido principal de la página-->

        <section class="contenedor-contacto-googlemaps">
            <div class="formulario-contacto">
                <h2>Envianos tu consulta</h2>
                <form action="/submit" method="post"><!--etiqueta contenedora del formulario-->
                    <fieldset>
                        <legend>Formulario de contacto</legend>
                    
                            <div>
                                <label for="nombre">Nombre y apellido:</label>
                                <input type="text" name="Nombre-y-apellido" id="nombre-y-apellido">
                            </div>
                            <div>
                                <label for="email">Email:</label>
                                <input type="email" name="email" id="email">
                            </div>
                            <div>
                                <label for="mensaje">Mensaje:</label>
                                <textarea name="mensaje" id="mensaje"></textarea>
                            </div>

                            <input type="submit" value="Enviar">
                    </fieldset>
                </form> 
            </div>

            <div class="contenedor-googlemaps">
                <iframe class="googlemaps"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3281.523521419675!2d-58.374754688148336!3d-34.666734372818865!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bccd117a817ac7%3A0xe96eaf98ef0c5ca!2sGesti%C3%B3n%20SySO!5e0!3m2!1ses!2sar!4v1738023741121!5m2!1ses!2sar"
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">>
                </iframe>
            </div>
        </section>
    </main>

    <footer><!--pie de página-->
        <div class="contenedor-de-footer">
            <div class="logo-footer">
                <img src="../assets/img/Logopit_1546119869136.png" alt="Logotipo de la empresa">
            </div>

            <div class="contacto-footer">
                <h4>Contacto</h4>
                <!-- Enlace con la imagen al contacto -->
                <div class="contenedor-contacto">
                    <div class="whatsapp-footer">
                        <a href="https://api.whatsapp.com/send?phone=541159969956" target="_blank" title="Enviar Whatsapp">
                            <img src="../assets/img/whatsapp.png" alt="Icono de Whatsapp" style="width: 32px; height: 32px;">
                        </a>
                        <a href="https://api.whatsapp.com/send?phone=541159969956">1159969956</a>
                    </div>

                    <div class="cooreo-footer">
                        <a href="mailto:info@gestionsyso.com" target="_blank" title="Enviar correo electrónico">
                            <img src="../assets/img/email.png" alt="Icono de correo electrónico" style="width: 32px; height: 32px;">
                        </a>
                        <a href="mailto:info@gestionsyso.com">info@gestionsyso.com</a>
                    </div>
                </div>
            </div>

            <div class="redes-sociales-footer">
                <h4>Visítanos en nuestras redes sociales</h4>
                <!-- Enlace con la imagen de la red social -->
                <div class="iconos-redes-sociales-footer">
                    <a href="https://www.facebook.com/GestionSySO/" target="_blank" title="Visítanos en Facebook">
                        <img src="../assets/img/facebook.png" alt="Icono de Facebook" style="width: 32px; height: 32px;">
                    </a>
                    <a href="https://twitter.com/Gestion_SySO" target="_blank" title="Visítanos en Twitter">
                        <img src="../assets/img/twitter.png" alt="Icono de Twitter" style="width: 32px; height: 32px;">
                    </a>
                    <a href="https://www.instagram.com/gestionsyso/" target="_blank" title="Visítanos en Instagram">
                        <img src="../assets/img/instagram.png" alt="Icono de Instagram" style="width: 32px; height: 32px;">
                    </a>
                    <a href="https://www.linkedin.com/company/gestionsyso/" target="_blank" title="Visítanos en Linkedin">
                        <img src="../assets/img/linkedin.png" alt="Icono de Linkedin" style="width: 32px; height: 32px;">
                    </a>
                </div>
            </div>
        </div>

        <div class="copyrigh-footer">
